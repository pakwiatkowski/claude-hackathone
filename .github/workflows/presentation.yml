name: Generate Presentation on Commit

on:
  push:
    branches: ["**"]

jobs:
  generate-presentation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate presentation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: python -m src.main

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Render slides to HTML
        run: |
          mkdir -p presentations
          marp output/presentation.md --html --output presentations/presentation.html

      - name: Commit presentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add presentations/
          git diff --cached --quiet || git commit -m "docs: add generated presentation for ${{ github.sha }}"
          git push
